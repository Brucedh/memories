name: Deploy Application

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Issue Tracebit canary credentials alongside your real deployment.
      # These decoy AWS credentials act as tripwires — if an attacker
      # compromises your CI/CD pipeline and exfiltrates secrets, any
      # attempt to use these credentials will trigger a Tracebit alert.
      - name: Issue credentials
        id: issue-credentials
        uses: ./.github/actions/issue-credentials
        with:
          tracebit-api-token: ${{ secrets.TRACEBIT_API_TOKEN }}
          # Optional overrides (defaults shown):
          # write-profile: 'true'
          # profile-name: 'global-access-RpvooXr'
          # export-env: 'true'
          # env-prefix: '__AWS__'
          # region: 'us-east-2'
          # continue-on-error: 'true'

      - name: Deploy to AWS
        run: |
          echo "Running deployment..."
          # e.g. aws ecs update-service, cdk deploy, terraform apply, etc.
